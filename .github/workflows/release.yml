name: Release

on:
  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Run build
        run: pnpm build

      - name: Prepare release files
        run: |
          mkdir release
          cp main.js release/
          cp manifest.json release/
          cp src/styles.css release/

      - name: Create ZIP archive
        run: |
          cd release
          zip -r materialify.zip .

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release/materialify.zip
